name: Build UserScript

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    # 必须给予写入权限，否则无法推送到分支
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      # 关键步骤：将 dist 目录发布到 dist 分支
      - name: Deploy to dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist      # 编译产物所在的目录
          publish_branch: dist     # 目标分支名
          force_orphan: true       # 如果你希望 dist 分支只保留最新版本（不保留历史记录），设为 true
          commit_message: "Build: ${{ github.sha }} [skip ci]"
